<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
 "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
     xmlns:ui="jakarta.faces.facelets"
      	xmlns:f="jakarta.faces.core"
      	xmlns:h="jakarta.faces.html"
	xmlns:p="http://primefaces.org/ui">

<ui:composition template="/WEB-INF/templates/templateprincipal.xhtml">

	<ui:define name="contenido">
		<f:event listener="#{backingLogin.validarSesion()}" type="preRenderView" />
		<h:form id="formFacturacion">
			<p:growl id="growl" life="3000" showDetail="true" />
			
			<p:breadCrumb>
				<p:menuitem value="Inicio" url="/paginas/inicio.xhtml" />
				<p:menuitem value="Contabilidad" url="#" />
				<p:menuitem value="Gestión de Facturación" />
			</p:breadCrumb>
			
			<br />
			
			<p:dataTable id="tblFacturas" value="#{beanFacturacion.listaFacturas}" var="fac" 
						 paginator="true" rows="10" responsiveLayout="scroll"
						 emptyMessage="No se encontraron facturas registradas.">
				
				<p:column headerText="Fecha" sortBy="#{fac.fechaEmision}">
					<h:outputText value="#{fac.fechaEmision}" />
				</p:column>
				
				<p:column headerText="Número" filterBy="#{fac.numero}" filterMatchMode="contains">
					<h:outputText value="#{fac.numero}" />
				</p:column>
				
				<p:column headerText="Cliente">
					<h:outputText value="#{fac.cliente.nombresCompletos}" />
				</p:column>
				
				<p:column headerText="Total" style="text-align: right;">
					<h:outputText value="#{fac.total}">
						<f:convertNumber type="currency" currencySymbol="$" />
					</h:outputText>
				</p:column>
				
				<p:column headerText="Estado SRI">
					<p:tag value="#{fac.documentoElectronico != null ? fac.documentoElectronico.estado : 'PENDIENTE'}" 
						   severity="#{fac.documentoElectronico != null and fac.documentoElectronico.estado == 'AUTORIZADO' ? 'success' : (fac.documentoElectronico != null and fac.documentoElectronico.estado == 'RECHAZADO' ? 'danger' : 'warning')}" />
				</p:column>
				
				<p:column headerText="Acciones" style="width: 150px; text-align: center;">
					<p:commandButton icon="pi pi-cloud-upload" title="Emitir al SRI" 
									 actionListener="#{backingFacturacion.emitirFactura(fac)}"
									 rendered="#{fac.documentoElectronico == null or fac.documentoElectronico.estado != 'AUTORIZADO'}"
									 update=":formFacturacion:growl :formFacturacion:tblFacturas" 
									 styleClass="ui-button-warning" />
					
					<p:commandButton icon="pi pi-file-pdf" title="Descargar RIDE" ajax="false"
									 rendered="#{fac.documentoElectronico != null and fac.documentoElectronico.pdfRide != null}"
									 styleClass="ui-button-success">
						<p:fileDownload value="#{backingFacturacion.descargarRide(fac)}" />
					</p:commandButton>
				</p:column>
				
			</p:dataTable>
			
			<br />
			
			<p:commandButton value="Nueva Factura" icon="pi pi-plus" 
							 actionListener="#{backingFacturacion.prepararNuevaFactura()}"
							 oncomplete="PF('dlgNuevaFactura').show()"
							 update="dlgNuevaFactura" />
							 
			<p:dialog id="dlgNuevaFactura" widgetVar="dlgNuevaFactura" header="Crear Nueva Factura" 
					  modal="true" width="95%" height="85vh" responsive="true" fitViewport="true"
					  styleClass="invoice-dialog" closeOnEscape="true" draggable="false" resizable="false">
				
				<p:scrollPanel mode="native" style="height:calc(85vh - 110px); border:none;">
					<p:outputPanel id="pnlNuevaFactura" style="padding: 1.5rem;">
						<div class="ui-fluid">
							<!-- Datos del Cliente -->
							<p:panel header="Datos del Cliente" styleClass="invoice-panel">
								<div class="p-grid p-formgrid">
									<div class="p-col-12 p-md-4 p-field">
										<p:outputLabel value="Identificación:" for="txtIdentificacion" />
										<div class="ui-inputgroup">
											<p:inputText id="txtIdentificacion" value="#{beanFacturacion.identificacionBusqueda}" placeholder="Cédula/RUC" />
											<p:commandButton icon="pi pi-search" actionListener="#{backingFacturacion.buscarCliente()}" 
															 process="@this txtIdentificacion"
															 update="pnlDatosCliente pnlFormularioCliente" 
															 styleClass="ui-button-primary"/>
										</div>
									</div>
									<div class="p-col-12 p-md-8 p-field p-d-flex p-ai-center" style="padding-top: 1.5rem;">
										<p:outputPanel id="pnlDatosCliente">
											<h:outputText value="#{beanFacturacion.clienteSeleccionado.nombresCompletos}" 
														  style="font-weight: 700; color: var(--primary-color); font-size: 1.25rem;" 
														  rendered="#{beanFacturacion.clienteSeleccionado != null and !beanFacturacion.mostrarFormularioNuevoCliente}" />
											<h:panelGroup rendered="#{beanFacturacion.clienteSeleccionado == null}" styleClass="p-d-flex p-ai-center" style="color: var(--danger-color);">
												<i class="pi pi-exclamation-circle p-mr-2"></i>
												<h:outputText value="Seleccione un cliente para continuar" />
											</h:panelGroup>
										</p:outputPanel>
									</div>
								</div>

								<!-- Formulario para Nuevo Cliente -->
								<p:outputPanel id="pnlFormularioCliente">
									<h:panelGroup rendered="#{beanFacturacion.mostrarFormularioNuevoCliente}">
										<div class="p-grid p-formgrid p-mt-3">
											<div class="p-col-12 p-md-6 p-field">
												<p:outputLabel value="Nombres Completos:" for="txtNombres" />
												<p:inputText id="txtNombres" value="#{beanFacturacion.clienteSeleccionado.nombresCompletos}" required="true" />
											</div>
											<div class="p-col-12 p-md-6 p-field">
												<p:outputLabel value="Correo:" for="txtCorreo" />
												<p:inputText id="txtCorreo" value="#{beanFacturacion.clienteSeleccionado.correo}" required="true" />
											</div>
											<div class="p-col-12 p-md-4 p-field">
												<p:outputLabel value="Teléfono:" for="txtTelefono" />
												<p:inputText id="txtTelefono" value="#{beanFacturacion.clienteSeleccionado.telefono}" required="true" />
											</div>
											<div class="p-col-12 p-md-4 p-field">
												<p:outputLabel value="Dirección:" for="txtDireccion" />
												<p:inputText id="txtDireccion" value="#{beanFacturacion.clienteSeleccionado.direccion}" required="true" />
											</div>
											<div class="p-col-12 p-md-4 p-field">
												<p:outputLabel value="Tipo Identificación:" for="selTipoId" />
												<p:selectOneMenu id="selTipoId" value="#{beanFacturacion.clienteSeleccionado.tipoIdentificacion}">
													<f:selectItem itemLabel="Cédula" itemValue="1" />
													<f:selectItem itemLabel="RUC" itemValue="2" />
													<f:selectItem itemLabel="Pasaporte" itemValue="3" />
												</p:selectOneMenu>
											</div>
										</div>
									</h:panelGroup>
								</p:outputPanel>
							</p:panel>
							
							<br/>
							
							<!-- Detalle de Factura -->
							<p:panel header="Detalle de Factura" styleClass="invoice-panel">
								<div class="p-grid p-formgrid p-ai-end p-mb-3">
									<div class="p-col-12 p-md-6 p-field">
										<p:outputLabel value="Ítem:" for="selItem" />
										<div class="ui-inputgroup">
											<p:selectOneMenu id="selItem" value="#{beanFacturacion.itemSeleccionado}" converter="selectOneMenuConverter" filter="true" filterMatchMode="contains">
												<f:selectItem itemLabel="Seleccione un ítem..." itemValue="#{null}" />
												<f:selectItems value="#{beanFacturacion.listaItems}" var="it" 
															   itemLabel="#{it.nombre}" itemValue="#{it}" />
											</p:selectOneMenu>
											<p:commandButton icon="pi pi-plus" actionListener="#{backingFacturacion.prepararNuevoItem()}"
															 oncomplete="PF('dlgNuevoItem').show()" update=":formNuevoItem"
															 styleClass="ui-button-info" process="@this" title="Crear nuevo ítem">
												<p:resetInput target=":formNuevoItem" />
											</p:commandButton>
										</div>
									</div>
									<div class="p-col-12 p-md-3 p-field">
										<p:outputLabel value="Cantidad:" for="txtCantidad" />
										<p:inputNumber id="txtCantidad" value="#{beanFacturacion.detalleNuevo.cantidad}" decimalPlaces="0" />
									</div>
									<div class="p-col-12 p-md-3 p-field">
										<p:commandButton value="Agregar" icon="pi pi-plus" 
														 actionListener="#{backingFacturacion.agregarDetalle()}" 
														 process="@this selItem txtCantidad"
														 update="tblDetalles pnlTotales" 
														 styleClass="ui-button-success"/>
									</div>
								</div>
								
								<p:dataTable id="tblDetalles" value="#{beanFacturacion.listaDetallesNueva}" var="det" 
											 reflow="true" styleClass="p-mt-2" emptyMessage="No hay detalles agregados.">
									<p:column headerText="Descripción">
										<h:outputText value="#{det.item.nombre}" />
									</p:column>
									<p:column headerText="Cantidad" style="text-align: center; width: 80px;">
										<h:outputText value="#{det.cantidad}" />
									</p:column>
									<p:column headerText="Precio Unit." style="text-align: right; width: 120px;">
										<h:outputText value="#{det.precioUnitario}">
											<f:convertNumber type="currency" currencySymbol="$" />
										</h:outputText>
									</p:column>
									<p:column headerText="Subtotal" style="text-align: right; width: 120px;">
										<h:outputText value="#{det.precioUnitario * det.cantidad}">
											<f:convertNumber type="currency" currencySymbol="$" />
										</h:outputText>
									</p:column>
								</p:dataTable>
								
								<div class="p-grid p-mt-3">
									<div class="p-col-12 p-md-8">
										<!-- Formas de Pago -->
										<p:panel header="Formas de Pago" styleClass="invoice-panel" style="height: 100%;">
											<div class="p-grid p-formgrid p-ai-end p-mb-3">
												<div class="p-col-12 p-md-4 p-field">
													<p:outputLabel value="Forma de Pago:" for="selFormaPago" />
													<p:selectOneMenu id="selFormaPago" value="#{beanFacturacion.idFormaPagoSeleccionada}" filter="true" filterMatchMode="contains" style="width: 100%;">
														<f:selectItem itemLabel="Seleccione..." itemValue="#{null}" />
														<f:selectItems value="#{beanFacturacion.listaFormasPagoSri}" var="fpSri" 
																	   itemLabel="#{fpSri.srfpCodigoSri} - #{fpSri.srfpDescripcion}" itemValue="#{fpSri.srfpId}" />
													</p:selectOneMenu>
												</div>
												<div class="p-col-12 p-md-2 p-field">
													<p:outputLabel value="Valor:" for="txtValorPago" />
													<p:inputNumber id="txtValorPago" value="#{beanFacturacion.nuevaFormaPago.valor}" symbol="$" decimalPlaces="2" style="width: 100%;" />
												</div>
												<div class="p-col-12 p-md-2 p-field">
													<p:outputLabel value="Plazo:" for="txtPlazoPago" />
													<p:inputText id="txtPlazoPago" value="#{beanFacturacion.nuevaFormaPago.plazo}" placeholder="Ej: 30" style="width: 100%;" />
												</div>
												<div class="p-col-12 p-md-2 p-field">
													<p:outputLabel value="Tiempo:" for="selTiempoPago" />
													<p:selectOneMenu id="selTiempoPago" value="#{beanFacturacion.nuevaFormaPago.tiempo}" style="width: 100%;">
														<f:selectItem itemLabel="Seleccione..." itemValue="#{null}" />
														<f:selectItem itemLabel="Días" itemValue="Días" />
														<f:selectItem itemLabel="Meses" itemValue="Meses" />
														<f:selectItem itemLabel="Años" itemValue="Años" />
													</p:selectOneMenu>
												</div>
												<div class="p-col-12 p-md-2 p-field">
													<p:commandButton icon="pi pi-plus" 
																	 actionListener="#{backingFacturacion.agregarFormaPago()}" 
																	 process="@this selFormaPago txtValorPago txtPlazoPago selTiempoPago"
																	 update="tblFormasPago selFormaPago txtValorPago txtPlazoPago selTiempoPago :formFacturacion:growl" 
																	 styleClass="ui-button-success" style="width: 100%;" title="Agregar Pago"/>
												</div>
											</div>
											
											<p:dataTable id="tblFormasPago" value="#{beanFacturacion.listaFormasPagoAgregadas}" var="fpa" 
														 reflow="true" styleClass="p-mt-2" emptyMessage="No hay formas de pago agregadas.">
												<p:column headerText="Forma de Pago">
													<h:outputText value="#{fpa.sriformapagos.srfpCodigoSri} - #{fpa.sriformapagos.srfpDescripcion}" />
												</p:column>
												<p:column headerText="Valor" style="text-align: right; width: 100px;">
													<h:outputText value="#{fpa.valor}">
														<f:convertNumber type="currency" currencySymbol="$" />
													</h:outputText>
												</p:column>
												<p:column headerText="Plazo" style="text-align: center; width: 80px;">
													<h:outputText value="#{fpa.plazo}" />
												</p:column>
												<p:column headerText="Tiempo" style="text-align: center; width: 80px;">
													<h:outputText value="#{fpa.tiempo}" />
												</p:column>
												<p:column headerText="Acción" style="text-align: center; width: 60px;">
													<p:commandButton icon="pi pi-trash" styleClass="ui-button-danger rounded-button" 
																	 actionListener="#{backingFacturacion.removerFormaPago(fpa)}"
																	 process="@this" update="tblFormasPago :formFacturacion:growl" />
												</p:column>
											</p:dataTable>
										</p:panel>
									</div>
									<div class="p-col-12 p-md-4">
										<!-- Resumen Totales -->
										<p:panel header="Resumen" styleClass="invoice-panel" style="height: 100%;">
											<p:outputPanel id="pnlTotales">
												<div class="p-d-flex p-jc-between p-mb-2">
													<h:outputText value="Subtotal (0%):" style="font-weight: bold;"/>
													<h:outputText value="#{beanFacturacion.nuevaFactura.subtotal}">
														<f:convertNumber type="currency" currencySymbol="$" />
													</h:outputText>
												</div>
												<div class="p-d-flex p-jc-between p-mb-2">
													<h:outputText value="Descuento:" style="font-weight: bold;"/>
													<h:outputText value="#{beanFacturacion.nuevaFactura.descuentoTotal}">
														<f:convertNumber type="currency" currencySymbol="$" />
													</h:outputText>
												</div>
												<div class="p-d-flex p-jc-between p-mb-2">
													<h:outputText value="Impuestos:" style="font-weight: bold;"/>
													<h:outputText value="#{beanFacturacion.nuevaFactura.totalImpuestos}">
														<f:convertNumber type="currency" currencySymbol="$" />
													</h:outputText>
												</div>
												<p:divider />
												<div class="p-d-flex p-jc-between p-mt-2" style="font-size: 1.25rem;">
													<h:outputText value="TOTAL:" style="font-weight: bold; color: var(--primary-color);"/>
													<h:outputText value="#{beanFacturacion.nuevaFactura.total}" style="font-weight: bold; color: var(--primary-color);">
														<f:convertNumber type="currency" currencySymbol="$" />
													</h:outputText>
												</div>
											</p:outputPanel>
										</p:panel>
									</div>
								</div>
							</p:panel>
						</div>
					</p:outputPanel>
				</p:scrollPanel>
				
				<f:facet name="footer">
					<div class="p-d-flex p-jc-end p-ai-center" style="gap: 1rem; padding: 0.5rem 1rem;">
						<p:commandButton value="Cancelar" icon="pi pi-times" 
										 onclick="PF('dlgNuevaFactura').hide()" 
										 styleClass="ui-button-secondary ui-button-outlined" />
						<p:commandButton value="Guardar y Emitir Factura" icon="pi pi-check" 
										 actionListener="#{backingFacturacion.guardarFactura()}" 
										 process="@this pnlNuevaFactura"
										 update="growl tblFacturas" 
										 styleClass="ui-button-primary"
										 style="min-width: 250px;"/>
					</div>
				</f:facet>
			</p:dialog>
		</h:form>

		<p:dialog id="dlgNuevoItem" widgetVar="dlgNuevoItem" header="Registrar Nuevo Ítem" 
				  modal="true" responsive="true" width="450px" fitViewport="true"
				  appendTo="@(body)" closeOnEscape="true" draggable="false" resizable="false">
			<h:form id="formNuevoItem">
				<p:messages id="msgsItem" closable="true" showDetail="true">
					<p:autoUpdate />
				</p:messages>
				
				<p:scrollPanel mode="native" style="max-height: 60vh; border:none;">
					<p:outputPanel id="pnlNuevoItem" styleClass="ui-fluid" style="padding: 1rem;">
						<div class="p-field p-mb-3">
							<p:outputLabel value="Código:" for="txtCodItem" styleClass="p-d-block p-mb-1" />
							<p:inputText id="txtCodItem" value="#{beanFacturacion.nuevoItem.codigo}" required="true" maxlength="8" />
							<p:message for="txtCodItem" />
						</div>
						<div class="p-field p-mb-3">
							<p:outputLabel value="Nombre:" for="txtNomItem" styleClass="p-d-block p-mb-1" />
							<p:inputText id="txtNomItem" value="#{beanFacturacion.nuevoItem.nombre}" required="true" maxlength="50" />
							<p:message for="txtNomItem" />
						</div>
						<div class="p-field p-mb-3">
							<p:outputLabel value="Tipo:" for="selTipoItem" styleClass="p-d-block p-mb-1" />
							<p:selectOneMenu id="selTipoItem" value="#{beanFacturacion.nuevoItem.tipo}">
								<f:selectItem itemLabel="Bien" itemValue="BIEN" />
								<f:selectItem itemLabel="Servicio" itemValue="SERVICIO" />
							</p:selectOneMenu>
							<p:message for="selTipoItem" />
						</div>
						<div class="p-field p-mb-3">
							<p:outputLabel value="Descripción:" for="txtDesItem" styleClass="p-d-block p-mb-1" />
							<p:inputTextarea id="txtDesItem" value="#{beanFacturacion.nuevoItem.descripcion}" required="true" rows="2" />
							<p:message for="txtDesItem" />
						</div>
						<div class="p-field p-mb-3">
							<p:outputLabel value="Precio Unitario:" for="txtPreItem" styleClass="p-d-block p-mb-1" />
							<p:inputNumber id="txtPreItem" value="#{beanFacturacion.nuevoItem.precio}" symbol="$" required="true" decimalPlaces="2" />
							<p:message for="txtPreItem" />
						</div>
					</p:outputPanel>
				</p:scrollPanel>

				<div class="p-d-flex p-jc-end p-p-3" style="gap: 0.5rem; border-top: 1px solid var(--border-color);">
					<p:commandButton value="Cancelar" icon="pi pi-times" onclick="PF('dlgNuevoItem').hide()" 
									 styleClass="ui-button-secondary ui-button-flat" type="button" />
					<p:commandButton value="Guardar" icon="pi pi-check" actionListener="#{backingFacturacion.guardarNuevoItem()}"
									 process="@form" update="@form :formFacturacion:growl :formFacturacion:selItem" 
									 styleClass="ui-button-success" />
				</div>
			</h:form>
		</p:dialog>
	</ui:define>
</ui:composition>

</html>
