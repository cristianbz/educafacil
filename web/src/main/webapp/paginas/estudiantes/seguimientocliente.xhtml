<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
 "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
     xmlns:ui="jakarta.faces.facelets"
      	xmlns:f="jakarta.faces.core"
      	xmlns:h="jakarta.faces.html"
	xmlns:p="http://primefaces.org/ui">

<ui:composition template="/WEB-INF/templates/templateprincipal.xhtml">

	<ui:define name="contenido">
		
		<f:event listener="#{backingLogin.validarSesion()}"
			type="preRenderView" />
		<h:form id="form" prependId="false">

			<p:growl id="growl" life="3000" showDetail="true" />
			<p:hotkey bind="esc" handler="PF('dlgNuevoSeguimiento').hide();"></p:hotkey>
			
			<ui:include src="/paginas/estudiantes/fragmentos/dialogoActualizarDesdeExcel.xhtml" />
			<ui:include src="/paginas/estudiantes/fragmentos/dialogoNuevoSeguimiento.xhtml" />
			<ui:include src="/paginas/estudiantes/fragmentos/dialogoCargarInfo.xhtml" />
			<ui:include src="/paginas/estudiantes/fragmentos/dialogoDetalleSeguimiento.xhtml" />
			<!-- Envio de mensajes whastapp -->
			<p:dialog widgetVar="dlgMensajeMasivo" modal="true" width="50%"
				height="200px;" header="#{titulos['mensajeMasivo']}">
				<p:outputPanel>
					<div class="ui-fluid p-formgrid p-grid">
						<div class="p-field p-col-12 p-md-12">
							<p:outputLabel value="#{etiquetas['mensaje']}" />
						</div>
						<div class="p-field p-col-12 p-md-12">
							<p:inputTextarea
								value="#{backingSeguimientoClientes.beanSeguimiento.contenidoMensaje}">

							</p:inputTextarea>
						</div>
						<div class="p-field p-col-12 p-md-4"></div>
						<div class="p-field p-col-12 p-md-4">
							<p:commandButton value="#{botones['enviarMensaje']}"
								process="@this"
								actionListener="#{backingSeguimientoClientes.enviarMensajeMasivo()}" />
						</div>
						<div class="p-field p-col-12 p-md-4"></div>
					</div>
				</p:outputPanel>
			</p:dialog>
			
			

			<p:dialog widgetVar="dlgLlamar" modal="true" width="100%"
				height="200px;" header="#{titulos['pendientesLlamar']}">
				<p:outputPanel id="pnlLlamar">
					<p:dataTable id="tblllamar"
						value="#{backingSeguimientoClientes.beanSeguimiento.listaLlamarAhora}"
						rowKey="#{sc.segcId}" paginator="true" rows="6"
						selectionMode="single"
						selection="#{backingSeguimientoClientes.beanSeguimiento.seguimientoSeleccionado}"
						var="sc">
						<p:ajax event="rowSelect"
							listener="#{backingSeguimientoClientes.onRowSelect}"
							update="pnlseguimiento growl" partialSubmit="true"
							process="@this" />
						<p:ajax event="rowUnselect"
							listener="#{backingSeguimientoClientes.onRowUnselect}"
							partialSubmit="true" process="@this" />
						<p:column headerText="#{etiquetas['clientePotencial']}"
							style="width:200px;">
					#{sc.segcCliente}
				</p:column>
						<p:column headerText="#{etiquetas['curso']}">
					#{sc.curso.cursNombre}
				</p:column>
						<p:column headerText="#{etiquetas['telefono']}"
							style="width:100px;">
					#{sc.segcTelefono}
				</p:column>
						<p:column headerText="#{etiquetas['ultimoSeg']}">
					#{sc.segcUltimoSeguimiento}
				</p:column>
						<p:column headerText="#{etiquetas['estado']}" style="width:150px;">
							<p:outputLabel
								value="#{sc.segcEstado.equals('CONTAC01')?'EN SEGUIMIENTO':sc.segcEstado.equals('CONTAC02')?'ABANDONADO':sc.segcEstado.equals('CONTAC03')?'MATRICULADO':sc.segcEstado.equals('CONTAC04')?'CANDIDATO':'PROXIMAOCASION'}" />
						</p:column>
						<p:column headerText="#{etiquetas['proximaLlamada']}"
							style="width:100px;">
							<p:outputLabel value="#{sc.segcProximaLlamada}" id="proximacall"
								style="color:red;"
								rendered="#{sc.segcProximaLlamada!=null?true:false}">
								<f:convertDateTime for="proximacall" pattern="yyyy-MM-dd" />
							</p:outputLabel>
						</p:column>

					</p:dataTable>
				</p:outputPanel>
			</p:dialog>
			<p:dialog widgetVar="dlgEnProc" draggable="false" modal="true"
				resizable="false" closable="false" responsive="true"
				style="font-size: 10px;">
				<h:graphicImage value="/resources/img/cargando.gif" width="200"
					height="200" />
			</p:dialog>
			<p:dialog widgetVar="dlgFormulario" modal="true" closable="true"
				resizable="false" appendTo="@form" minHeight="40" width="450"
				showEffect="fade" header="#{titulos['descargarFacebook']}">
				<h:panelGrid>
					<p:outputLabel value="#{etiquetas['campania']}" />
					<p:selectOneMenu id="idcampaniaFormulario"
						converter="selectOneMenuConverter" filterMatchMode="contains"
						filter="true" panelStyle="width:300px;" style="width:300px;"
						value="#{backingSeguimientoClientes.beanSeguimiento.campaniaSeleccionada}">
						<f:selectItems
							value="#{backingSeguimientoClientes.beanSeguimiento.listaCampaniasTodas}"
							var="camp" itemLabel="#{camp.campDescripcion}"
							itemValue="#{camp}" required="true"
							requiredMessage="#{mensajes['campoRequerido']}" />
						<p:ajax process="@this idcampaniaFormulario archivoFormulario"
							update="archivoFormulario" partialSubmit="true"
							listener="#{backingSeguimientoClientes.activaUploadFormulario()}"
							event="change" />
					</p:selectOneMenu>
					<p:outputLabel value="#{etiquetas['camposAdicionales']}" />
					<p:toggleSwitch
						value="#{backingSeguimientoClientes.beanSeguimiento.camposAdicionales}" />
					<p:outputPanel id="archivoFormulario">
						<p:fileUpload mode="advanced" multiple="false"
							rendered="#{backingSeguimientoClientes.beanSeguimiento.activaUploadFormulario}"
							sizeLimit="102400" allowTypes="/(\.|\/)(xls|xlsx)$/"
							invalidSizeMessage="Máximo tamaño permitido 100 KB"
							invalidFileMessage="solo xlsx es permitido"
							update="growl tblFormulario" process="@this"
							listener="#{backingSeguimientoClientes.handleFileUploadFormulario}" />
						<p:dataTable id="tblFormulario" scrollable="true"
							scrollHeight="150px;" emptyMessage="#{mensajes['noRegistros']}"
							rendered="#{backingSeguimientoClientes.beanSeguimiento.activaUploadFormulario}"
							value="#{backingSeguimientoClientes.beanSeguimiento.listadoSeguimientoExcel}"
							var="excel">
							<p:column style="width:100px;">
					             		#{excel.segcCliente}
					             		<p:inputText value="#{excel.segcCorreo}">
									<p:ajax process="@this" event="blur" />
								</p:inputText>
							</p:column>

							<p:column style="width:50px;">
					             		#{excel.segcTelefono}
					             	</p:column>

						</p:dataTable>
						<br />
						<p:commandButton process="@this " value="#{botones['procesar']}"
							partialSubmit="true" update="growl "
							onstart="PF('dlgEnProc').show();"
							oncomplete="PF('dlgEnProc').hide();"
							rendered="#{backingSeguimientoClientes.beanSeguimiento.activaUploadFormulario}"
							icon="#{botones['icono.ruedas']}"
							actionListener="#{backingSeguimientoClientes.procesarSubidaFormulario()}" />

					</p:outputPanel>
				</h:panelGrid>

			</p:dialog>
			<p:dialog widgetVar="dlgExcel" modal="true" closable="true"
				resizable="false">
				<p:fileUpload mode="advanced" multiple="false" sizeLimit="102400"
					allowTypes="/(\.|\/)(xls|xlsx)$/"
					invalidSizeMessage="Máximo tamaño permitido 100 KB"
					invalidFileMessage="solo xls es permitido"
					update="growl tblsegexcel" process="@this"
					listener="#{backingSeguimientoClientes.handleFileUpload}" />
				<p:dataTable id="tblsegexcel"
					value="#{backingSeguimientoClientes.beanSeguimiento.listadoSeguimientoExcel}"
					var="excel" scrollable="true" scrollHeight="200px;">
					<p:column>
             		#{excel.segcId}
             	</p:column>
					<p:column>
             		#{excel.segcCliente}
             	</p:column>
					<p:column>
             		#{excel.segcUltimoSeguimiento}
             	</p:column>
					<p:column>
             		#{excel.segcEstado}
             	</p:column>
				</p:dataTable>
				<br />
				<p:commandButton process="@this" value="#{botones['procesar']}"
					partialSubmit="true" update="growl"
					onstart="PF('dlgEnProc').show();"
					oncomplete="PF('dlgEnProc').hide();"
					icon="#{botones['icono.ruedas']}"
					actionListener="#{backingSeguimientoClientes.procesarSubidaExcel()}" />
			</p:dialog>

			
			<p:dialog widgetVar="dlgdatoscampania" modal="true" closable="true"
				header="#{titulos['campania']}">
				<h:panelGrid columns="2" id="datoscampania">
					<p:outputLabel value="#{etiquetas['campania']}:" />
					<p:outputLabel
						value="#{backingSeguimientoClientes.beanSeguimiento.campaniaSeleccionada.campDescripcion}" />
					<p:outputLabel value="#{etiquetas['fechaInicio']}:" />
					<p:outputLabel id="fdesde"
						value="#{backingSeguimientoClientes.beanSeguimiento.campaniaSeleccionada.campFechaDesde}">
						<f:convertDateTime for="fdesde" pattern="yyyy-MM-dd" />
					</p:outputLabel>
					<p:outputLabel value="#{etiquetas['fechaFin']}:" />
					<p:outputLabel id="fhasta"
						value="#{backingSeguimientoClientes.beanSeguimiento.campaniaSeleccionada.campFechaHasta}">
						<f:convertDateTime for="fhasta" pattern="yyyy-MM-dd" />
					</p:outputLabel>
					<p:outputLabel value="#{etiquetas['valor']}:" />
					<p:outputLabel
						value="#{backingSeguimientoClientes.beanSeguimiento.campaniaSeleccionada.campCosto}" />
					<p:outputLabel value="#{etiquetas['contenido']}:" />
					<p:outputLabel
						value="#{backingSeguimientoClientes.beanSeguimiento.campaniaSeleccionada.campTipoContenido.equals('CAMP01')?'INFOGRAFIA':'VIDEO'}" />
				</h:panelGrid>
			</p:dialog>

			<p:dialog widgetVar="dlgcampanias" modal="true" closable="false"
				header="#{titulos['campania']}">
				<p:outputPanel id="idlstcampanias">
					<p:selectOneListbox id="idcampania"
						converter="selectOneMenuConverter"
						value="#{backingSeguimientoClientes.beanSeguimiento.campaniaSeleccionada}">
						<f:selectItems
							value="#{backingSeguimientoClientes.beanSeguimiento.listaCampanias}"
							var="camp" itemLabel="#{camp.campDescripcion}"
							itemValue="#{camp}" required="true"
							requiredMessage="#{mensajes['campoRequerido']}" />
						<p:ajax process="@this idcampania valorcampania"
							update="valorcampania" partialSubmit="true" event="click"
							listener="#{backingSeguimientoClientes.cerrarDialogoCampania()}" />
					</p:selectOneListbox>
					<p:message for="idcampania" />
				</p:outputPanel>

			</p:dialog>


			<p:dialog widgetVar="dlgmotivos" modal="true" closable="false"
				header="#{titulos['motivosNoInteres']}">
				<h:panelGrid columns="1" id="motivos">
					<p:selectManyCheckbox id="idnoInteres" layout="grid" columns="3"
						styleClass="grid-checkbox"
						value="#{backingSeguimientoClientes.beanSeguimiento.motivosNoInteresSeleccionados}"
						label="motivos" style="width: 15rem">
						<f:selectItems
							value="#{backingSeguimientoClientes.beanSeguimiento.motivosNoInteres}"
							required="true" requiredMessage="#{mensajes['campoRequerido']}" />
						<p:ajax process="@this" event="change" update="motivos" />
					</p:selectManyCheckbox>
					<p:message for="idnoInteres" />
				</h:panelGrid>
				<center>
					<p:commandButton partialSubmit="true" process="@this"
						icon="#{botones['icono.grabar']}" value="#{botones['agregar']}"
						actionListener="#{backingSeguimientoClientes.registrarMotivosNoInteres()}" />
				</center>
			</p:dialog>

			<p:dialog widgetVar="dlggrabar" modal="true" appendTo="@(body)"
				header="#{titulos['grabar']}">
				<p:outputPanel id="pnlGrabarSC">
					<p:selectBooleanCheckbox
						value="#{backingSeguimientoClientes.beanSeguimiento.seguirIngresandoClientes}"
						rendered="#{backingSeguimientoClientes.beanSeguimiento.seguimientoInicial}"
						itemLabel="#{etiquetas['continuarIngrClientes']}">
						<p:ajax process="@this" />
					</p:selectBooleanCheckbox>
					<br />
					<br />
					<center>
						<h:panelGrid columns="2">
							<p:commandButton value="#{botones['grabar']}"
								onstart="PF('dlgEnProc').show();"
								oncomplete="PF('dlgEnProc').hide();"
								icon="#{botones['icono.grabar']}"
								process="@this  tblllamar panelSeguimiento" partialSubmit="true"
								action="#{backingSeguimientoClientes.grabarSeguimiento()}"
								update="growl   tblllamar pnlseguimiento">
								<p:resetInput target="tblSeg" />

							</p:commandButton>
							<p:commandButton value="#{botones['cancelar']}"
								icon="#{botones['icono.cancelar']}" process="@this"
								oncomplete="PF('dlggrabar').hide();" />
						</h:panelGrid>
					</center>
				</p:outputPanel>
			</p:dialog>
			<p:breadCrumb styleClass="mb-3">
				<p:menuitem value="Inicio" icon="pi pi-home" outcome="/paginas/index?faces-redirect=true" />
				<p:menuitem value="Marketing"  />
				<p:menuitem value="Seguimiento clientes" />
			</p:breadCrumb>
			<div class="page-header">

				<div class="page-title">
					<h2>Seguimiento de Clientes</h2>
					<small>Gestión y control de interacciones comerciales</small>
				</div>

				<div class="page-actions">

					<!-- Acción primaria -->
					<p:commandButton value="Nuevo Seguimiento" icon="pi pi-plus"
						styleClass="ui-button-success" process="@this panelSeguimiento"
						update="pnlseguimiento panelSeguimiento"
						actionListener="#{backingSeguimientoClientes.nuevoSeguimiento}" />

					<!-- Acciones secundarias -->
					<p:menuButton value="Más acciones" icon="pi pi-ellipsis-v">

						<p:menuitem value="#{botones['cargarregistrodatos']}"
							process="@this " partialSubmit="true" icon="pi pi-cloud-upload"
							update="campanias tblllamar"
							actionListener="#{backingSeguimientoClientes.mostrarDialogoCargaInfo}">
							<p:resetInput target="tblSeg" />
						</p:menuitem>

						<p:menuitem value="#{botones['actSeguimiento']}" process="@this "
							icon="pi pi-refresh"
							actionListener="#{backingSeguimientoClientes.mostrarDlgSeguimiento}"
							update="tblsegexcel" />

						<p:menuitem value="#{botones['descargarFormulario']}"
							icon="pi pi-facebook" process="@this " partialSubmit="true"
							actionListener="#{backingSeguimientoClientes.mostrarDlgFormulario}"
							update="idcampaniaFormulario archivoFormulario" />

					</p:menuButton>

				</div>

			</div>

			<p:outputPanel id="panelSeguimiento">
				<p:dataTable rows="10" paginator="true"
					filteredValue="#{backingSeguimientoClientes.beanSeguimiento.listadoSeguimientoSeleccionado}"
					selectionMode="single"
					selection="#{backingSeguimientoClientes.beanSeguimiento.seguimientoSeleccionado}"
					rowKey="#{seg.segcId}"
					value="#{backingSeguimientoClientes.beanSeguimiento.listadoSeguimiento}"
					widgetVar="tblseguimiento" id="tblSeg" reflow="true"
					rowStyleClass="#{seg.segcEstado.equals('CONTAC02')?'abandonado':seg.segcEstado.equals('CONTAC03')?'inscrito':seg.segcEstado.equals('CONTAC04')?'candidato':seg.segcEstado.equals('CONTAC05')?'otraocasion':null}"
					paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
					var="seg">
					<f:facet name="{Exporters}">
						<div style="float: right; padding-top: 5px;">
							<h:commandLink immediate="true">
								<h:graphicImage library="img" name="excel.png" />
								<p:dataExporter type="xls" target="tblSeg"
									fileName="interesados" />
							</h:commandLink>

						</div>
					</f:facet>
					<p:ajax event="rowSelect"
						listener="#{backingSeguimientoClientes.onRowSelect}"
						update="pnlseguimiento growl" partialSubmit="true" process="@this" />
					<p:ajax event="rowUnselect"
						listener="#{backingSeguimientoClientes.onRowUnselect}"
						partialSubmit="true" process="@this" />
					<p:column headerText="#{etiquetas['id']}" width="35px;">
						<p:outputLabel value="#{seg.segcId}" />
					</p:column>
					<p:column headerText="#{etiquetas['campania']}"
						filterBy="#{seg.campania.campDescripcion}" style="width:200px;">
						<p:outputLabel value="#{seg.campania.campDescripcion}" />
						<p:commandButton icon="#{botones['icono.info']}"
							style="width:15px; height:20px;"
							action="#{backingSeguimientoClientes.mostrarDialogoDatosCampania()}"
							update="datoscampania"
							rendered="#{seg.campania==null?false:true}" process="@this">
							<f:setPropertyActionListener value="#{seg.campania}"
								target="#{backingSeguimientoClientes.beanSeguimiento.campaniaSeleccionada}"></f:setPropertyActionListener>
						</p:commandButton>
					</p:column>
					<p:column headerText="#{etiquetas['clientePotencial']}"
						filterBy="#{seg.segcCliente}" style="width:200px;">
						<p:outputLabel value="#{seg.segcCliente}" />

					</p:column>
					<p:column headerText="#{etiquetas['curso']}"
						filterBy="#{seg.curso.cursNombre}" style="width:200px;">
						<p:outputLabel value="#{seg.curso.cursNombre}" />
					</p:column>
					<p:column headerText="#{etiquetas['estado']}"
						filterMatchMode="exact" filterBy="#{seg.segcEstado}"
						style="width:150px;">
						<f:facet name="filter">
							<p:selectOneMenu onchange="PF('tblseguimiento').filter()">
								<f:selectItem itemLabel="Todos" itemValue="#{null}"
									noSelectionOption="true" />
								<f:selectItem itemLabel="EN SEGUIMIENTO" itemValue="CONTAC01" />
								<f:selectItem itemLabel="ABANDONADO" itemValue="CONTAC02" />
								<f:selectItem itemLabel="MATRICULADO" itemValue="CONTAC03" />
								<f:selectItem itemLabel="CANDIDATO" itemValue="CONTAC04" />
								<f:selectItem itemLabel="PROXIMAOCASION" itemValue="CONTAC05" />
							</p:selectOneMenu>
						</f:facet>
						<p:outputLabel
							value="#{seg.segcEstado.equals('CONTAC01')?'EN SEGUIMIENTO':seg.segcEstado.equals('CONTAC02')?'ABANDONADO':seg.segcEstado.equals('CONTAC03')?'MATRICULADO':seg.segcEstado.equals('CONTAC04')?'CANDIDATO':'PROXIMAOCASION'}" />
					</p:column>
					<p:column headerText="#{etiquetas['fechaUltimoSeg']}"
						sortBy="#{seg.segcFechaSeguimiento}" style="width:120px;">
						<p:outputLabel value="#{seg.segcFechaSeguimiento}" id="fechaseg">
							<f:convertDateTime for="fechaseg" pattern="yyyy-MM-dd"
								locale="es_EC" />
						</p:outputLabel>
					</p:column>
					<p:column headerText="#{etiquetas['telefono']}"
						style="width:120px;" filterBy="#{seg.segcTelefono}">
						<p:outputLabel value="#{seg.segcTelefono}" />
					</p:column>
					<p:column headerText="#{etiquetas['ultimoSeg']}" width="200px;">
						<p:outputLabel value="#{seg.segcUltimoSeguimiento}" />
						<h:inputHidden />
						<p:outputLabel value="#{etiquetas['proximaLlamada']}:"
							style="color:red;"
							rendered="#{seg.segcProximaLlamada!=null?true:false}" />
						<p:outputLabel value="#{seg.segcProximaLlamada}" id="proximacall"
							style="color:red;"
							rendered="#{seg.segcProximaLlamada!=null?true:false}">
							<f:convertDateTime for="proximacall" pattern="yyyy-MM-dd" />
						</p:outputLabel>
					</p:column>

					<p:column style="width:70px;">

						<p:commandLink process="@this" title="#{tooltip['seguimiento']}"
							action="#{backingSeguimientoClientes.cargaDetalleSeguimiento()}"
							update="detalleSeguimiento">
							<f:setPropertyActionListener value="#{seg}"
								target="#{backingSeguimientoClientes.beanSeguimiento.seguimientoClientes}"></f:setPropertyActionListener>
							<i class="pi pi-share-alt" style="font-size: 1em; color: green;"></i>
						</p:commandLink>

						<p:commandLink title="#{tooltip['realizaSeguimiento']}"
							process="@this" partialSubmit="true"
							action="#{backingSeguimientoClientes.agregarNuevoSeguimiento()}"
							update="pnlseguimiento growl">
							<f:setPropertyActionListener value="#{seg}"
								target="#{backingSeguimientoClientes.beanSeguimiento.seguimientoClientes}"></f:setPropertyActionListener>
							<i class="pi pi-chevron-circle-down"
								style="font-size: 1em; color: green;"></i>
						</p:commandLink>
					</p:column>
				</p:dataTable>

			</p:outputPanel>

		</h:form>
	</ui:define>
</ui:composition>

</html>
