<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="jakarta.faces.facelets"
	xmlns:f="jakarta.faces.core"
	xmlns:h="jakarta.faces.html"
	xmlns:p="http://primefaces.org/ui">
	
	<p:dialog widgetVar="dlgActualizaDesdeExcel" modal="true" width="50%"
				height="200px;" header="#{titulos['clientesPotenciales']}">
				<p:outputPanel id="pnlActualizaDesdeExcel">
					
					<div class="p-field p-col-12 p-md-12">
						<p:outputLabel value="#{etiquetas['campania']}" />
					</div>
					<div class="p-field p-col-12 p-md-12">
						<p:selectOneMenu id="idcampaniaFormFaces"
							converter="selectOneMenuConverter" filterMatchMode="contains"
							filter="true" panelStyle="width:300px;" style="width:300px;"
							value="#{backingSeguimientoClientes.beanSeguimiento.campaniaSeleccionada}">
							<f:selectItems
								value="#{backingSeguimientoClientes.beanSeguimiento.listaCampaniasTodas}"
								var="camp" itemLabel="#{camp.campDescripcion}"
								itemValue="#{camp}" required="true"
								requiredMessage="#{mensajes['campoRequerido']}" />
							<p:ajax process="@this " update="nroPreguntas"
								partialSubmit="true"							
								event="change" />
						</p:selectOneMenu>
					</div>
					<div class="field col-12 md:col-1">
		                <p:outputLabel for="@next" value="Nro Preguntas"/>
		                 <p:selectOneRadio id="nroPreguntas" 
		                 	required="true" requiredMessage="#{mensajes['campoRequerido']}"
		                 	value="#{backingSeguimientoClientes.beanSeguimiento.numeroPreguntas}" layout="lineDirection">
				            <f:selectItem itemLabel="Cero" itemValue="0"/>
				            <f:selectItem itemLabel="Uno" itemValue="1"/>
				            <f:selectItem itemLabel="Dos" itemValue="2"/>
				            <f:selectItem itemLabel="Tres" itemValue="3"/>
				            <p:ajax process="@this cargaExcelFacesbook" 
				            	listener="#{backingSeguimientoClientes.habilitaCargaFormFacebook()}"
				            	update="cargaExcelFacesbook" event="change"/>
				        </p:selectOneRadio>
				        <p:message for="nroPreguntas"/>
		            </div>
				<p:fileUpload mode="advanced" multiple="false" sizeLimit="102400" disabled="#{backingSeguimientoClientes.beanSeguimiento.habilitaCargaFormFaces}"
					allowTypes="/(\.|\/)(xls|xlsx)$/" id="cargaExcelFacesbook"
					invalidSizeMessage="Máximo tamaño permitido 100 KB"
					invalidFileMessage="solo xlsx es permitido" 
					update="growl tblsegexcelFormulario " process="@this"
					listener="#{backingSeguimientoClientes.handleFileUploadFormulario}" />
				<p:dataTable id="tblsegexcelFormulario"
					value="#{backingSeguimientoClientes.beanSeguimiento.listadoLeadsForm}"
					var="excel" scrollable="true" scrollHeight="200px;">
					
					<p:column headerText="#{etiquetas['cliente']}">
	             		#{excel.nombre()}
	             	</p:column>
					<p:column headerText="#{etiquetas['telefono']}">
	             		#{excel.telefono()}
	             	</p:column>
					<p:column headerText="#{etiquetas['estado']}">
	             		#{excel.estado()}
	             	</p:column>
				</p:dataTable>
				<br />
				<p:commandButton process="@this" value="#{botones['procesar']}"
					partialSubmit="true" update="growl"
					onstart="PF('dlgEnProc').show();"
					oncomplete="PF('dlgEnProc').hide();"
					icon="#{botones['icono.ruedas']}"
					actionListener="#{backingSeguimientoClientes.procesarFormularioFacebook()}" />
				</p:outputPanel>
			</p:dialog>
	
</ui:composition>
