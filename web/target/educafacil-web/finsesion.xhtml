<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">

<h:head>
	<link rel="stylesheet" type="text/css" href="#{request.contextPath}/resources/css/estilos.css" />
	<link rel="stylesheet" type="text/css" href="#{request.contextPath}/resources/css/custom.css" />
</h:head>
<h:body style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 1rem;">
	<div class="login-card-modern" style="text-align: center; padding: 3rem 2.5rem;">
		<div style="width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #fee2e2, #fecaca); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
			<i class="pi pi-clock" style="font-size: 2.5rem; color: #dc2626;"></i>
		</div>
		<div class="login-header-modern" style="margin-bottom: 1.5rem;">
			<h2 style="font-size: 1.75rem;">Sesi\u00f3n Expirada</h2>
			<p style="font-size: 1rem; color: var(--text-muted); line-height: 1.6; max-width: 320px; margin: 0.75rem auto 0;">
				Su tiempo de actividad ha caducado por seguridad. Para continuar, inicie sesi\u00f3n nuevamente.
			</p>
		</div>
		<h:form>
			<h:commandButton value="Volver a iniciar sesi\u00f3n" action="login" 
							style="background: var(--primary-color); border: none; border-radius: 0.75rem; padding: 0.85rem 2rem; font-weight: 600; width: 100%; color: #fff; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2); cursor: pointer; font-size: 1rem; transition: all 0.3s ease;" />
		</h:form>
		<div style="margin-top: 2rem; font-size: 0.85rem; color: var(--text-muted);">
			<i class="pi pi-shield" style="margin-right: 0.4rem;"></i>
			<span>Su informaci\u00f3n est\u00e1 protegida</span>
		</div>
	</div>
</h:body>
</html>
